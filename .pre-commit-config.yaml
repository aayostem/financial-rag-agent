# =============================================================================
# Financial RAG Agent — Pre-commit Configuration
# =============================================================================
# black is intentionally absent — ruff-format is black-compatible and
# the two must not coexist (they have conflicting opinions on some formatting).
# =============================================================================

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-config
        name: pytest config
        entry: pytest tests/unit/test_config.py
        language: system
        pass_filenames: false
        always_run: true

  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.10.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [pydantic, sqlalchemy]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, sqlalchemy]
        exclude: ^tests/