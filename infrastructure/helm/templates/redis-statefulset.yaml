{{- if .Values.redis.enabled }}
---
# =============================================================================
# Redis 7 — StatefulSet
# Cache layer for embedding lookups and query result TTL. AOF persistence
# enabled so hot cache survives pod restarts. maxmemory-policy=allkeys-lru
# ensures the most-valuable embeddings stay in memory under pressure.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "financial-rag-agent.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "financial-rag-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "financial-rag-agent.fullname" . }}-redis-headless
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "financial-rag-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "financial-rag-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999                  # redis user
        fsGroup: 999
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ include "financial-rag-agent.image" (dict "global" .Values.global "image" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            {{- toYaml .Values.redis.args | nindent 12 }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.redis.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.redis.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          {{- include "financial-rag-agent.labels" . | nindent 10 }}
          app.kubernetes.io/component: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.redis.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
---
# =============================================================================
# Redis — Headless Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "financial-rag-agent.fullname" . }}-redis-headless
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "financial-rag-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "financial-rag-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
---
# =============================================================================
# Redis — ClusterIP Service (used by API + Agent pods)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "financial-rag-agent.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "financial-rag-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "financial-rag-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
{{- end }}
