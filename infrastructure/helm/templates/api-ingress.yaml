{{- if and .Values.api.enabled .Values.api.ingress.enabled }}
---
# =============================================================================
# API — AWS ALB Ingress
# Terminates TLS at the ALB. Target-type=ip routes directly to pod IPs
# (avoids double-hop through kube-proxy). Requires AWS Load Balancer Controller.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "financial-rag-agent.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "financial-rag-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    {{- toYaml .Values.api.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- if .Values.api.ingress.tls }}
  tls:
    {{- toYaml .Values.api.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "financial-rag-agent.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
