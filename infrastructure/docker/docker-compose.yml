version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${POSTGRES_CONTAINER:-finrag-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_rag}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER:-user}', '-d', '${POSTGRES_DB:-financial_rag}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finrag-network

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER:-finrag-redis}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finrag-network

  # Optional: Add pgAdmin for database management (development only)
  pgadmin:
    image: dpage/pgadmin4
    container_name: finrag-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finrag.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - finrag-network

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: finrag-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - finrag-network

networks:
  finrag-network:
    driver: bridge

volumes:
  postgres_data:
    name: finrag_postgres_data
  redis_data:
    name: finrag_redis_data
  pgadmin_data:
    name: finrag_pgadmin_data