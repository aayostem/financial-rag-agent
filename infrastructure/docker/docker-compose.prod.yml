# =============================================================================
# Financial RAG Agent — Production Docker Compose
# infrastructure/docker/docker-compose.prod.yml
#
# Services:
#   - app:        FastAPI application (gunicorn + uvicorn workers)
#   - postgres:   PostgreSQL 17 with pgvector
#   - redis:      Redis 7 (cache + rate limiter)
#   - prometheus: Metrics collection
#   - grafana:    Metrics visualization
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Required env vars (set in .env.prod):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, API_KEY,
#   OPENAI_API_KEY (or GROQ_API_KEY), SECRET_KEY
# =============================================================================

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ============================================================================
  # Application
  # ============================================================================
  app:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: production
    image: financial-rag-agent:latest
    container_name: finrag-app
    <<: [*restart, *logging]
    environment:
      # === App Environment ===
      APP_ENV: production
      MOCK_EXTERNAL_APIS: "false"
      
      # === PostgreSQL ===
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: financial_rag
      POSTGRES_USER: finrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      
      # === Redis ===
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      
      # === Embeddings (OpenAI) ===
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: "1536"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      
      # === LLM (Groq) ===
      LLM_PROVIDER: openai
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY required}
      
      # === API Security ===
      API_KEY_ENABLED: "true"
      API_KEY: ${API_KEY:?API_KEY required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      
      # === Logging ===
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      LOG_FORMAT: json
      
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-4g}
          cpus: "${APP_CPU_LIMIT:-2.0}"
        reservations:
          memory: 1g

  # ============================================================================
  # PostgreSQL + pgvector
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: finrag-postgres
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: finrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: financial_rag
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01_create_schema.sql:/docker-entrypoint-initdb.d/01_create_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finrag -d financial_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-4g}
          cpus: "${POSTGRES_CPU_LIMIT:-2.0}"
        reservations:
          memory: 512m

  # ============================================================================
  # Redis
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: finrag-redis
    <<: [*restart, *logging]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --tcp-keepalive 60
      --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-1g}
          cpus: "${REDIS_CPU_LIMIT:-1.0}"
        reservations:
          memory: 128m

  # ============================================================================
  # Prometheus
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: finrag-prometheus
    <<: [*restart, *logging]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ============================================================================
  # Grafana
  # ============================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: finrag-grafana
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  postgres_data:
    name: finrag_postgres_data
  redis_data:
    name: finrag_redis_data
  prometheus_data:
    name: finrag_prometheus_data
  grafana_data:
    name: finrag_grafana_data

networks:
  default:
    name: finrag-prod-network
    driver: bridge