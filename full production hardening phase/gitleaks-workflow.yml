# =============================================================================
# .github/workflows/gitleaks.yml
# Standalone gitleaks job — runs on every PR, push to main, and on schedule.
# Separate from the pre-commit hook so CI catches secrets even if a developer
# bypassed pre-commit with --no-verify.
# =============================================================================
name: Gitleaks Secret Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Scan full history weekly — catches secrets in old commits
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      scan-depth:
        description: "Git log depth to scan (0 = full history)"
        default: "0"

permissions:
  contents: read
  security-events: write
  pull-requests: write  # to post findings as PR comments

jobs:
  gitleaks:
    name: "🔐 Gitleaks Secret Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for scheduled runs)
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 50 }}

      - name: Run Gitleaks — PR/push mode
        if: github.event_name != 'schedule'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # required for org-level scanning
        with:
          args: >
            --config=.gitleaks.toml
            --verbose
            --redact
            --report-format=sarif
            --report-path=gitleaks-results.sarif
            --log-level=info

      - name: Run Gitleaks — full history mode (scheduled)
        if: github.event_name == 'schedule'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            --config=.gitleaks.toml
            --verbose
            --redact
            --report-format=sarif
            --report-path=gitleaks-results.sarif
            --log-opts="--all --full-history"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Post PR comment on secret detection
        uses: actions/github-script@v7
        if: failure() && github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 Secret Detected — PR Blocked

              Gitleaks has detected a potential secret in this PR.

              **Immediate actions required:**
              1. **Rotate the exposed credential NOW** — assume it is compromised
              2. Check \`git log --all\` to identify when it was introduced
              3. Remove the secret from the commit history (git-filter-repo or BFG)
              4. Review the Gitleaks findings in the [Security tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning)

              **Do not:**
              - Simply delete the file and recommit
              - Add the file to .gitignore
              - Use --no-verify to bypass the check

              This PR cannot be merged until all findings are resolved.`
            })

      - name: Alert security channel on secret detection
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
        run: |
          curl -s -X POST $SLACK_WEBHOOK \
            -H 'Content-type: application/json' \
            -d '{
              "text": "🚨 *SECRET DETECTED* in financial-rag-agent",
              "attachments": [{
                "color": "#ff0000",
                "fields": [
                  {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Action required", "value": "Rotate the exposed credential immediately", "short": false}
                ]
              }]
            }'
