apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: spot-burst
spec:
  template:
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m5", "m5a", "m6i", "m6a", "c5", "c6i", "r5", "r6i"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["xlarge", "2xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 2m
    expireAfter: 24h
  weight: 10
  limits:
    cpu: "100"
    memory: 400Gi
